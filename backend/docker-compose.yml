services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vylex
      POSTGRES_PASSWORD: vylex
      POSTGRES_DB: vylex
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vylex"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
