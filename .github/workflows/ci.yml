name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "backend/**"
      - ".github/workflows/backend.yml"
      - "**/*.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "backend/**"
      - ".github/workflows/backend.yml"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build · lint · detekt · test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}

      - name: Make wrapper executable
        run: chmod +x ./gradlew

      - name: Assemble debug
        run: ./gradlew --no-daemon assembleDebug

      - name: Lint (Android + Compose)
        run: ./gradlew --no-daemon lintDebug

      - name: detekt
        run: ./gradlew --no-daemon detekt

      - name: ktlint
        run: ./gradlew --no-daemon ktlintCheck

      - name: Unit tests
        run: ./gradlew --no-daemon testDebugUnitTest
