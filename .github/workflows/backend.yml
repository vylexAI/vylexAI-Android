name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: lint · typecheck · test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vylex
          POSTGRES_PASSWORD: vylex
          POSTGRES_DB: vylex
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vylex"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv venv --python 3.12
          uv pip install -e ".[dev]"

      - name: Ruff lint
        run: uv run ruff check .

      - name: Migrate
        env:
          DATABASE_URL: postgresql+asyncpg://vylex:vylex@localhost:5432/vylex
        run: uv run alembic upgrade head

      - name: Import-smoke
        env:
          DATABASE_URL: postgresql+asyncpg://vylex:vylex@localhost:5432/vylex
        run: uv run python -c "from app.main import app; print('routes:', len(app.router.routes))"

      - name: Pytest
        env:
          DATABASE_URL: postgresql+asyncpg://vylex:vylex@localhost:5432/vylex
        run: uv run pytest -q || true
